<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" stroke="#00d9ff" stroke-width="3"/>
  
  <!-- Grid pattern -->
  <line x1="32" y1="0" x2="32" y2="128" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="96" y1="0" x2="96" y2="128" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="32" x2="128" y2="32" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="64" x2="128" y2="64" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="96" x2="128" y2="96" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Accent squares -->
  <rect x="16" y="16" width="24" height="24" fill="none" stroke="#ffd700" stroke-width="2"/>
  <rect x="88" y="88" width="24" height="24" fill="none" stroke="#ff1493" stroke-width="2"/>
  <rect x="16" y="88" width="24" height="24" fill="none" stroke="#32ff00" stroke-width="2"/>
  
  <!-- Center "J" monogram -->
  <text x="64" y="85" font-family="monospace" font-size="60" font-weight="bold" fill="#00d9ff" text-anchor="middle" letter-spacing="-2">J</text>
  
  <!-- Offset shadow effect -->
  <rect x="4" y="4" width="128" height="128" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.2" stroke-dasharray="2,2"/>
</svg>
